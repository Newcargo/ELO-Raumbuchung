<style>
  :root{
    --bg:#12161d;
    --panel:#1a2029;
    --panel-alt:#212836;
    --border:#2b3341;
    --text:#e7eaf0;
    --text-dim:#8891a1;
    --amber:#f2b84c;
    --green:#3ecf8e;
    --red:#e15241;
    --blue:#4d8dff;
    --radius:6px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  ::selection{background:var(--amber);color:#12161d;}

  /* ---- App shell ---- */
  #app{min-height:100vh;display:flex;flex-direction:column;}
  header.topbar{
    background:var(--panel);border-bottom:1px solid var(--border);
    padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:center;gap:10px;margin-right:auto;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);}
  .brand h1{font-size:16px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;margin:0;}
  .brand small{display:block;color:var(--text-dim);font-size:11px;letter-spacing:.05em;margin-top:1px;}

  .btn{
    background:var(--panel-alt);border:1px solid var(--border);color:var(--text);
    padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;
    font-family:'Inter',sans-serif;transition:.15s;display:inline-flex;align-items:center;gap:6px;
  }
  .btn:hover{border-color:var(--amber);color:var(--amber);}
  .btn.primary{background:var(--amber);color:#181205;border-color:var(--amber);}
  .btn.primary:hover{filter:brightness(1.08);color:#181205;}
  .btn.danger{background:transparent;border-color:var(--red);color:var(--red);}
  .btn.danger:hover{background:var(--red);color:#fff;}
  .btn.ghost{background:transparent;}
  .btn.small{padding:5px 10px;font-size:12px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  .nav-group{display:flex;align-items:center;gap:6px;background:var(--panel-alt);border:1px solid var(--border);border-radius:var(--radius);padding:3px;}
  .nav-group .btn{border:none;background:transparent;padding:6px 10px;}
  .nav-group .btn.active{background:var(--amber);color:#181205;}
  .datepick{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;color:var(--text);background:transparent;border:none;padding:0 6px;min-width:118px;text-align:center;color-scheme:dark;cursor:pointer;}
  .datepick::-webkit-calendar-picker-indicator{cursor:pointer;opacity:1;}

  main{flex:1;padding:20px;max-width:1400px;margin:0 auto;width:100%;}

  /* ---- Board / Day view ---- */
  .board-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;background:var(--panel);}
  .board{display:grid;min-width:600px;}
  .board-head{display:grid;position:sticky;top:0;background:var(--panel);z-index:5;}
  .head-cell{
    padding:12px 10px;text-align:center;border-bottom:2px solid var(--border);border-left:1px solid var(--border);
  }
  .head-cell:first-child{border-left:none;}
  .head-cell .rname{font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:12.5px;}
  .head-cell .rmeta{font-size:10.5px;color:var(--text-dim);margin-top:2px;font-family:'IBM Plex Mono',monospace;}
  .time-col-head{padding:12px 10px;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;}

  .board-body{position:relative;display:grid;}
  .time-col{border-right:1px solid var(--border);}
  .time-label{
    height:var(--slot-h,32px);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);
    padding:2px 8px;text-align:right;border-top:1px solid var(--border);
  }
  .room-col{position:relative;border-left:1px solid var(--border);}
  .slot{height:var(--slot-h,32px);border-top:1px solid var(--border);cursor:pointer;transition:background .1s;}
  .slot:hover{background:rgba(62,207,142,.10);}
  .slot.blocked{cursor:not-allowed;}
  .slot.blocked:hover{background:transparent;}

  .booking-block{
    position:absolute;left:3px;right:3px;border-radius:5px;padding:5px 7px;overflow:hidden;
    cursor:pointer;border:1px solid rgba(0,0,0,.25);box-shadow:0 1px 3px rgba(0,0,0,.3);
  }
  .booking-block .bt{font-weight:700;font-size:11.5px;line-height:1.25;white-space:nowrap;text-overflow:ellipsis;overflow:hidden;}
  .booking-block .bc{font-size:10px;opacity:.85;font-family:'IBM Plex Mono',monospace;margin-top:1px;}

  .legend{display:flex;gap:18px;align-items:center;margin:12px 2px;font-size:12px;color:var(--text-dim);flex-wrap:wrap;}
  .legend .sw{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px;}

  /* ---- Week view ---- */
  .week-room-select{margin-bottom:14px;}
  select{
    background:var(--panel-alt);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);
    padding:8px 10px;font-family:'Inter',sans-serif;font-size:13px;
  }

  /* ---- Modal ---- */
  .overlay{position:fixed;inset:0;background:rgba(8,10,14,.72);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:10px;max-width:460px;width:100%;max-height:88vh;overflow-y:auto;}
  .modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .modal-head h3{margin:0;font-size:14px;text-transform:uppercase;letter-spacing:.08em;}
  .modal-body{padding:18px 20px;}
  .modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
  .close-x{background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;}
  .close-x:hover{color:var(--text);}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
  .field input[type=text],.field input[type=email],.field input[type=password],.field input[type=number],.field input[type=date],.field input[type=time],.field select{
    width:100%;background:var(--panel-alt);border:1px solid var(--border);border-radius:var(--radius);
    padding:9px 10px;color:var(--text);font-family:'Inter',sans-serif;font-size:13.5px;
  }
  .field input[type=date],.field input[type=time]{color-scheme:dark;}
  .field .mono-input{font-family:'IBM Plex Mono',monospace;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .hint{font-size:11px;color:var(--text-dim);margin-top:4px;}
  .checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;}
  .weekday-picker{display:flex;gap:6px;flex-wrap:wrap;}
  .wd-btn{
    width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--panel-alt);
    color:var(--text-dim);font-family:'Inter',sans-serif;font-size:11.5px;font-weight:700;cursor:pointer;transition:.15s;
  }
  .wd-btn:hover{border-color:var(--amber);color:var(--text);}
  .wd-btn.active{background:var(--amber);border-color:var(--amber);color:#181205;}

  .info-line{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--border);font-size:13px;}
  .info-line .k{color:var(--text-dim);}
  .info-line .v{font-weight:600;font-family:'IBM Plex Mono',monospace;}

  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
  .badge.free{background:rgba(62,207,142,.15);color:var(--green);}
  .badge.booked{background:rgba(225,82,65,.15);color:var(--red);}

  /* ---- Admin ---- */
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap;}
  .tab{padding:9px 14px;font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;}
  .tab.active{color:var(--amber);border-color:var(--amber);}
  .admin-panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:20px;}
  table.rooms-table{width:100%;border-collapse:collapse;font-size:13px;}
  table.rooms-table th{text-align:left;color:var(--text-dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;padding:8px 6px;border-bottom:1px solid var(--border);}
  table.rooms-table td{padding:8px 6px;border-bottom:1px solid var(--border);vertical-align:middle;}
  .swatch{width:16px;height:16px;border-radius:4px;display:inline-block;border:1px solid rgba(255,255,255,.2);}
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:720px){.settings-grid{grid-template-columns:1fr;} .row2{grid-template-columns:1fr;}}
  .section-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--amber);margin:22px 0 10px;font-weight:700;}
  .section-title:first-child{margin-top:0;}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel-alt);border:1px solid var(--border);border-radius:20px;padding:4px 6px 4px 12px;font-size:12.5px;margin:3px 4px 3px 0;}
  .chip button{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:2px 6px;}
  .chip button:hover{color:var(--red);}

  /* ---- QR grid ---- */
  .qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}
  .qr-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;}
  .qr-card canvas,.qr-card img{margin:0 auto 10px;background:#fff;padding:8px;border-radius:6px;}
  .qr-card .qname{font-weight:800;letter-spacing:.05em;text-transform:uppercase;font-size:13px;}
  .qr-card .qmeta{font-size:11px;color:var(--text-dim);margin-top:2px;font-family:'IBM Plex Mono',monospace;}
  @media print{
    header.topbar,.legend,.no-print{display:none!important;}
    body{background:#fff;color:#000;}
    .qr-card{break-inside:avoid;border-color:#ccc;}
  }

  .empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);}
  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel-alt);
    border:1px solid var(--border);border-left:3px solid var(--green);padding:12px 18px;border-radius:6px;
    font-size:13px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:90vw;
  }
  .toast.err{border-left-color:var(--red);}
  .lockbadge{font-size:11px;color:var(--amber);display:flex;align-items:center;gap:5px;}
  .cancel-code{
    font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;letter-spacing:.15em;
    background:var(--panel-alt);border:1px dashed var(--amber);color:var(--amber);
    padding:12px;border-radius:6px;text-align:center;margin:10px 0;
  }
</style>
</head>

const APP_VERSION = "1.8.0";

function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }
function t(key){ const v = (I18N[state.uiLang]||I18N.de)[key]; return v !== undefined ? v : key; }
function pad(n){ return String(n).padStart(2,'0'); }
function fmtDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function parseDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(d,n){ const nd=new Date(d); nd.setDate(nd.getDate()+n); return nd; }
function localeForLang(lang){ return lang==='en' ? 'en-GB' : lang==='fr' ? 'fr-CH' : 'de-CH'; }
function fmtHuman(d, lang){
  const opts={weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'};
  return d.toLocaleDateString(localeForLang(lang), opts);
}
function timeToMin(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function minToTime(m){ return `${pad(Math.floor(m/60))}:${pad(m%60)}`; }

/* ---------------- DB <-> app field mapping ---------------- */
function mapRoomFromDb(r){
  return { id:r.id, name:r.name, floor:r.floor, capacity:r.capacity, equipment:r.equipment, color:r.color, active:r.active, ruagOnly:r.ruag_only };
}
function mapRoomToDb(r){
  return { id:r.id, name:r.name, floor:r.floor, capacity:r.capacity, equipment:r.equipment, color:r.color, active:r.active, ruag_only:r.ruagOnly };
}
function mapBookingFromDb(b){
  return { id:b.id, roomId:b.room_id, date:b.date, startTime:b.start_time, endTime:b.end_time, name:b.name, company:b.company, title:b.title, email:b.email, createdAt:b.created_at, seriesId:b.series_id };

function mapBookingToDb(b){
  return { id:b.id, room_id:b.roomId, date:b.date, start_time:b.startTime, end_time:b.endTime, name:b.name, company:b.company, title:b.title, email:b.email, created_at:b.createdAt, series_id:b.seriesId||null };

/* ---------------- State ---------------- */
let state = {
  rooms: DEFAULT_ROOMS,
  settings: { ...DEFAULT_SETTINGS },
  bookings: [],
  view: 'day',
  currentDate: new Date(),
  weekRoomId: null,
  isAdmin: false,
  loading: true,
  adminTab: 'rooms',
  uiLang: 'de',
  myBookings: [],
};

function getQueryParam(k){ return new URLSearchParams(window.location.search).get(k); }

function withTimeout(promise, ms){
  return new Promise((resolve,reject)=>{
    const timer = setTimeout(()=>reject(new Error('timeout')), ms);
    promise.then(v=>{ clearTimeout(timer); resolve(v); }, e=>{ clearTimeout(timer); reject(e); });
  });
}
function safeParseArray(str){ try{ const v = JSON.parse(str); return Array.isArray(v) ? v : []; }catch(e){ return []; } }

async function loadData(){
  render(); // show "Laden…" immediately instead of a blank/black screen
  const LOAD_TIMEOUT = 8000;

  try{
    const [roomsRes, bookingsRes, settingsRes, sessionRes] = await Promise.all([
      withTimeout(sbClient.from('rooms').select('*').order('name'), LOAD_TIMEOUT).catch(e=>({error:e})),
      withTimeout(sbClient.from('bookings').select('*'), LOAD_TIMEOUT).catch(e=>({error:e})),
      withTimeout(sbClient.from('app_settings').select('data').eq('id',1).single(), LOAD_TIMEOUT).catch(e=>({error:e})),
      withTimeout(sbClient.auth.getSession(), LOAD_TIMEOUT).catch(()=>({data:{session:null}})),
    ]);

    state.rooms = (!roomsRes.error && roomsRes.data && roomsRes.data.length) ? roomsRes.data.map(mapRoomFromDb) : DEFAULT_ROOMS;
    state.bookings = (!bookingsRes.error && bookingsRes.data) ? bookingsRes.data.map(mapBookingFromDb) : [];
    state.settings = { ...DEFAULT_SETTINGS, ...((!settingsRes.error && settingsRes.data && settingsRes.data.data) || {}) };
    state.isAdmin = !!(sessionRes && sessionRes.data && sessionRes.data.session);

    // Device-local preferences (genuinely per-browser, fine to use localStorage here —
    // this is a standalone hosted site, not a sandboxed Claude artifact)
    try{
      const savedLang = localStorage.getItem('ui-lang');
      state.uiLang = (savedLang && I18N[savedLang]) ? savedLang : (state.settings.language || 'de');
    }catch(e){ state.uiLang = state.settings.language || 'de'; }
    try{
      state.myBookings = JSON.parse(localStorage.getItem('my-bookings') || '[]');
    }catch(e){ state.myBookings = []; }

    const qRoom = getQueryParam('room');
    const qDate = getQueryParam('date');
    if(qDate){ try{ state.currentDate = parseDate(qDate); }catch(e){} }
    state.view = qRoom ? 'week' : state.settings.defaultView;
    if(qRoom) state.weekRoomId = qRoom;
    if(!state.weekRoomId && state.rooms[0]) state.weekRoomId = state.rooms[0].id;

    // Keep admin state in sync if the session changes (e.g. token refresh, sign-out elsewhere)
    sbClient.auth.onAuthStateChange((event, session)=>{
      state.isAdmin = !!session;
      if(!state.isAdmin && state.view==='admin') state.view = 'day';
      render();
    });
  }catch(e){
    console.error('loadData failed', e);
  }finally{
    state.loading = false;
    render();
  }
}

function toast(msg, isErr){
  const root = document.getElementById('toastRoot');
  const el = document.createElement('div');

/* ---------------- Render root ---------------- */
function render(){
  const app = document.getElementById('app');
  if(state.loading){ app.innerHTML = `<div class="empty-state">Laden…</div>`; return; }

  app.innerHTML = `
    ${renderHeader()}
    <main>${renderMain()}</main>
  `;
  attachHeaderEvents();
  attachMainEvents();
}

function renderHeader(){
  const langs = [
    {code:'de', label:'DE'}, {code:'en', label:'EN'}, {code:'fr', label:'FR'}
  ];
  const langButtons = langs.map(l=>`<button class="btn small ${state.uiLang===l.code?'active':''}" data-lang="${l.code}">${l.label}</button>`).join('');
  return `
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <div>
        <h1 class="mono">${t('appTitle')} <span class="mono" style="font-size:10px;color:var(--text-dim);letter-spacing:.05em;text-transform:none;">v${APP_VERSION}</span></h1>
        ${t('appSub') ? `<small>${t('appSub')}</small>` : ''}
      </div>
    </div>
    <div class="nav-group">${langButtons}</div>
    <div class="nav-group">
      <button class="btn small ${state.view==='day'?'active':''}" data-act="view-day">${t('day')}</button>
      <button class="btn small ${state.view==='week'?'active':''}" data-act="view-week">${t('week')}</button>
      <button class="btn small ${state.view==='qr'?'active':''}" data-act="view-qr">${t('qrcodes')}</button>
    </div>
    ${state.view!=='qr' ? `
    <div class="nav-group">
      <button class="btn small" data-act="prev">←</button>
      <input type="date" id="dateJump" class="datepick mono" value="${fmtDate(state.currentDate)}">
      <button class="btn small" data-act="next">→</button>
      <button class="btn small" data-act="today">${t('today')}</button>
    </div>` : ''}
    ${state.isAdmin
      ? `<span class="lockbadge">🔓 ${t('admin')}</span><button class="btn small" data-act="admin-view">${t('settings')}</button><button class="btn small ghost" data-act="logout">${t('logout')}</button>`
      : `<button class="btn small ghost" data-act="admin-login">🔒 ${t('admin')}</button>`}
  </header>`;
}

function attachHeaderEvents(){
  const h = document.querySelector('header.topbar');
  h.querySelectorAll('[data-lang]').forEach(el=>{
    el.onclick = ()=>setUiLang(el.getAttribute('data-lang'));
  });
  h.querySelector('[data-act="view-day"]').onclick = ()=>{ state.view='day'; render(); };
  h.querySelector('[data-act="view-week"]').onclick = ()=>{ state.view='week'; render(); };
  h.querySelector('[data-act="view-qr"]').onclick = ()=>{ state.view='qr'; render(); };
  const prev = h.querySelector('[data-act="prev"]');
  const next = h.querySelector('[data-act="next"]');
  const tdy = h.querySelector('[data-act="today"]');
  const dateJump = h.querySelector('#dateJump');
  if(dateJump) dateJump.onchange = ()=>{
    if(dateJump.value){ state.currentDate = parseDate(dateJump.value); render(); }
  };
  if(prev) prev.onclick = ()=>{ state.currentDate = addDays(state.currentDate, state.view==='week'?-7:-1); render(); };
  if(next) next.onclick = ()=>{ state.currentDate = addDays(state.currentDate, state.view==='week'?7:1); render(); };
  if(tdy) tdy.onclick = ()=>{ state.currentDate = new Date(); render(); };
  const adminBtn = h.querySelector('[data-act="admin-login"]');
  if(adminBtn) adminBtn.onclick = openAdminLogin;
  const adminView = h.querySelector('[data-act="admin-view"]');
  if(adminView) adminView.onclick = ()=>{ state.view='admin'; render(); };
  const logout = h.querySelector('[data-act="logout"]');
  if(logout) logout.onclick = async ()=>{
    await sbClient.auth.signOut().catch(()=>{});
    state.isAdmin=false; if(state.view==='admin') state.view='day'; render(); toast('Abgemeldet');
  };
}

function attachMainEvents(){
  if(state.view==='day') attachDayEvents();
  else if(state.view==='week') attachWeekEvents();
  else if(state.view==='qr') attachQrEvents();
  else if(state.view==='admin') attachAdminEvents();
}

function renderMain(){
  if(state.view==='day') return renderDayView();
  if(state.view==='week') return renderWeekView();
  if(state.view==='qr') return renderQrView();
  if(state.view==='admin') return state.isAdmin ? renderAdminView() : renderNoAccess();
  return '';
}

function renderNoAccess(){
  return `<div class="empty-state">🔒 ${t('admin')}</div>`;
}

/* ---------------- Day View ---------------- */
function activeRooms(){ return state.rooms.filter(r=>r.active !== false); }

function slotsForDay(){
  const s = state.settings;
  const startM = timeToMin(s.openStart), endM = timeToMin(s.openEnd);
  const slots = [];
  for(let m=startM; m<endM; m+=s.bookingIntervalMinutes) slots.push(m);
  return slots;
}

function renderDayView(){
  const rooms = activeRooms();
  const dateStr = fmtDate(state.currentDate);
  const isWeekend = [0,6].includes(state.currentDate.getDay());
  if(isWeekend && !state.settings.allowWeekends){
    return `<div class="empty-state">${t('weekendDisabled')}</div>`;
  }
  if(!rooms.length) return `<div class="empty-state">${t('noActiveRooms')}</div>`;

  const slots = slotsForDay();
  const slotH = 32;
  const dayBookings = state.bookings.filter(b=>b.date===dateStr);

  const headCols = rooms.map(r=>`
    <div class="head-cell" style="border-left-color:var(--border)">
      <div class="rname" style="color:${r.color}">${escapeHtml(r.name)}${r.ruagOnly ? ' 🔒' : ''}</div>
      <div class="rmeta">${escapeHtml(r.floor||'')}${r.capacity?` · ${r.capacity}p`:''}${r.ruagOnly ? ` · ${t('ruagOnlyBadge')}` : ''}</div>
    </div>`).join('');

  const timeLabels = slots.map(m=>`<div class="time-label mono">${minToTime(m)}</div>`).join('');

  const roomCols = rooms.map(r=>{
    const rBookings = dayBookings.filter(b=>b.roomId===r.id);
    const blocks = rBookings.map(b=>{
      const top = (timeToMin(b.startTime)-slots[0])/state.settings.bookingIntervalMinutes*slotH;
      const height = (timeToMin(b.endTime)-timeToMin(b.startTime))/state.settings.bookingIntervalMinutes*slotH;
      return `<div class="booking-block" data-booking="${b.id}" style="top:${top}px;height:${Math.max(height,slotH-4)}px;background:${r.color}33;border-color:${r.color};">
        <div class="bt">${escapeHtml(b.title||b.name)}</div>
        <div class="bc">${b.startTime}–${b.endTime} · ${escapeHtml(b.company||'')}</div>
      </div>`;
    }).join('');
    const slotDivs = slots.map(m=>`<div class="slot" data-room="${r.id}" data-min="${m}"></div>`).join('');
    return `<div class="room-col" data-roomcol="${r.id}">${slotDivs}${blocks}</div>`;
  }).join('');

  return `
    <div class="legend">
      <span><span class="sw" style="background:rgba(62,207,142,.5)"></span>${t('free')} (klicken zum Buchen)</span>
      <span><span class="sw" style="background:var(--amber)"></span>${t('booked')}</span>
    </div>
    <div class="board-wrap">
      <div class="board" style="--slot-h:${slotH}px;grid-template-columns:64px repeat(${rooms.length}, minmax(140px,1fr));">
        <div class="board-head" style="grid-template-columns:64px repeat(${rooms.length}, minmax(140px,1fr));grid-column:1/-1;display:grid;">
          <div class="time-col-head"></div>${headCols}
        </div>
        <div class="board-body" style="grid-template-columns:64px repeat(${rooms.length}, minmax(140px,1fr));grid-column:1/-1;display:grid;">
          <div class="time-col">${timeLabels}</div>
          ${roomCols}
        </div>
      </div>
    </div>
  `;
}

function attachDayEvents(){
  document.querySelectorAll('.slot').forEach(el=>{
    el.onclick = ()=>{
      const roomId = el.getAttribute('data-room');
      const startMin = parseInt(el.getAttribute('data-min'));
      openBookingModal(roomId, fmtDate(state.currentDate), startMin);
    };
  });
  document.querySelectorAll('.booking-block').forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation(); openBookingDetail(el.getAttribute('data-booking')); };
  });
}

/* ---------------- Week View ---------------- */
function startOfWeek(d){
  const nd = new Date(d);
  const day = nd.getDay();
  const diff = (day===0? -6 : 1) - day; // Monday start
  nd.setDate(nd.getDate()+diff);
  return nd;
}

function renderWeekView(){
  const rooms = activeRooms();
  if(!rooms.length) return `<div class="empty-state">${t('noActiveRooms')}</div>`;
  if(!state.weekRoomId || !rooms.find(r=>r.id===state.weekRoomId)) state.weekRoomId = rooms[0].id;
  const room = rooms.find(r=>r.id===state.weekRoomId);

  const monday = startOfWeek(state.currentDate);
  let days = [0,1,2,3,4,5,6].map(i=>addDays(monday,i));
  if(!state.settings.allowWeekends) days = days.filter(d=>![0,6].includes(d.getDay()));

  const slots = slotsForDay();
  const slotH = 26;

  const headCols = days.map(d=>{
    const isToday = fmtDate(d)===fmtDate(new Date());
    return `<div class="head-cell" style="${isToday?'background:rgba(242,184,76,.08)':''}">
      <div class="rname" style="font-size:11.5px;">${d.toLocaleDateString(localeForLang(state.uiLang),{weekday:'short'})}</div>
      <div class="rmeta">${pad(d.getDate())}.${pad(d.getMonth()+1)}</div>
    </div>`;
  }).join('');

  const timeLabels = slots.map(m=>`<div class="time-label mono" style="height:${slotH}px;">${minToTime(m)}</div>`).join('');

  const dayCols = days.map(d=>{
    const dateStr = fmtDate(d);
    const rBookings = state.bookings.filter(b=>b.roomId===room.id && b.date===dateStr);
    const blocks = rBookings.map(b=>{
      const top = (timeToMin(b.startTime)-slots[0])/state.settings.bookingIntervalMinutes*slotH;
      const height = (timeToMin(b.endTime)-timeToMin(b.startTime))/state.settings.bookingIntervalMinutes*slotH;
      return `<div class="booking-block" data-booking="${b.id}" style="top:${top}px;height:${Math.max(height,slotH-3)}px;background:${room.color}33;border-color:${room.color};">
        <div class="bt" style="font-size:10.5px;">${escapeHtml(b.title||b.name)}</div>
        <div class="bc" style="font-size:9px;">${b.startTime}–${b.endTime}</div>
      </div>`;
    }).join('');
    const slotDivs = slots.map(m=>`<div class="slot" style="height:${slotH}px;" data-room="${room.id}" data-date="${dateStr}" data-min="${m}"></div>`).join('');
    return `<div class="room-col" data-roomcol="${room.id}">${slotDivs}${blocks}</div>`;
  }).join('');

  const options = rooms.map(r=>`<option value="${r.id}" ${r.id===room.id?'selected':''}>${escapeHtml(r.name)}${r.ruagOnly ? ' 🔒 '+t('ruagOnlyBadge') : ''}</option>`).join('');

  return `
    <div class="week-room-select">
      <select id="weekRoomSelect">${options}</select>
    </div>
    <div class="board-wrap">
      <div class="board" style="--slot-h:${slotH}px;grid-template-columns:56px repeat(${days.length}, minmax(90px,1fr));">
        <div class="board-head" style="grid-template-columns:56px repeat(${days.length}, minmax(90px,1fr));grid-column:1/-1;display:grid;">
          <div class="time-col-head"></div>${headCols}
        </div>
        <div class="board-body" style="grid-template-columns:56px repeat(${days.length}, minmax(90px,1fr));grid-column:1/-1;display:grid;">
          <div class="time-col">${timeLabels}</div>
          ${dayCols}
        </div>
      </div>
    </div>
  `;
}

function attachWeekEvents(){
  const sel = document.getElementById('weekRoomSelect');
  if(sel) sel.onchange = ()=>{ state.weekRoomId = sel.value; render(); };
  document.querySelectorAll('.slot').forEach(el=>{
    el.onclick = ()=>{
      const roomId = el.getAttribute('data-room');
      const date = el.getAttribute('data-date');
      const startMin = parseInt(el.getAttribute('data-min'));
      openBookingModal(roomId, date, startMin);
    };
  });
  document.querySelectorAll('.booking-block').forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation(); openBookingDetail(el.getAttribute('data-booking')); };
  });
}

let qrLibPromise = null;
function loadQrLib(){
  if(window.QRCode) return Promise.resolve();
  if(qrLibPromise) return qrLibPromise;
  qrLibPromise = new Promise((resolve,reject)=>{
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
  return qrLibPromise;
}

function overlaps(aStart,aEnd,bStart,bEnd){ return aStart < bEnd && bStart < aEnd; }

async function submitBooking(roomId){
  const s = state.settings;
  const room = state.rooms.find(r=>r.id===roomId);
  if(room && room.ruagOnly){
    const companyVal = document.getElementById('bCompany').value;
    if(!companyVal || companyVal.trim().toLowerCase()!=='ruag'){ toast(t('ruagOnlyBlock'), true); return; }
  }
  const date = document.getElementById('bDate').value;
  const start = document.getElementById('bStart').value;
  const end = document.getElementById('bEnd').value;
  const name = document.getElementById('bName').value.trim();
  const company = document.getElementById('bCompany').value;
  const title = document.getElementById('bTitle').value.trim();
  const email = document.getElementById('bEmail').value.trim();
  const recurring = document.getElementById('bRecurring') ? document.getElementById('bRecurring').checked : false;
  const weeks = document.getElementById('bWeeks') ? parseInt(document.getElementById('bWeeks').value)||1 : 1;
  const intervalWeeks = document.getElementById('bInterval') ? Math.max(1, parseInt(document.getElementById('bInterval').value)||1) : 1;

  if(!name || !date || !start || !end){ toast(t('fillRequired'), true); return; }
  if(s.requireCompany && !company){ toast(t('fillRequired'), true); return; }
  if(s.requireEmail && !email){ toast(t('fillRequired'), true); return; }

  const startM = timeToMin(start), endM = timeToMin(end);
  const dur = endM - startM;
  if(dur <= 0 || dur < s.minDurationMinutes || dur > s.maxDurationMinutes){
    toast(t('conflict'), true); return;
  }
  if(startM < timeToMin(s.openStart) || endM > timeToMin(s.openEnd)){
    toast(t('conflict'), true); return;
  }

  const datesToBook = [date];
  if(recurring){
    const selectedDays = Array.from(document.querySelectorAll('.wd-btn.active')).map(b=>parseInt(b.getAttribute('data-day')));
    const days = selectedDays.length ? selectedDays : [parseDate(date).getDay()];
    const startD = parseDate(date);
    const startWeekStart = startOfWeek(startD);
    const totalDays = weeks * 7;
    datesToBook.length = 0;
    for(let i=0; i<totalDays; i++){
      const d = addDays(startD, i);
      if(!days.includes(d.getDay())) continue;
      const dWeekStart = startOfWeek(d);
      const weeksDiff = Math.round((dWeekStart - startWeekStart) / (7*24*60*60*1000));
      if(weeksDiff % intervalWeeks === 0) datesToBook.push(fmtDate(d));
    }
    if(!datesToBook.length) datesToBook.push(date);
  }

  const buf = s.bufferMinutes||0;
  for(const dStr of datesToBook){
    const conflict = state.bookings.some(b=>{
      if(b.roomId!==roomId || b.date!==dStr) return false;
      return overlaps(startM-buf, endM+buf, timeToMin(b.startTime), timeToMin(b.endTime));
    });
    if(conflict){ toast(`${t('conflict')} (${dStr})`, true); return; }
  }

  const seriesId = datesToBook.length > 1 ? uid() : null;
  const newBookings = datesToBook.map(dStr=>({
    id: uid(), roomId, date: dStr, startTime: start, endTime: end,
    name, company, title, email, createdAt: Date.now(), seriesId
  }));
  state.bookings.push(...newBookings);
  state.myBookings.push(...newBookings.map(b=>b.id));
  state.currentDate = parseDate(date);
  state.weekRoomId = roomId;
  closeModal();
  render();
  insertBookings(newBookings).then(ok=>{ if(ok) toast(t('bookedOk')); });
  try{ localStorage.setItem('my-bookings', JSON.stringify(state.myBookings)); }catch(e){}
}

function submitEditBooking(b){
  const s = state.settings;
  const room = state.rooms.find(r=>r.id===b.roomId);
  if(room && room.ruagOnly){
    const companyVal = document.getElementById('eCompany').value;
    if(!companyVal || companyVal.trim().toLowerCase()!=='ruag'){ toast(t('ruagOnlyBlock'), true); return; }
  }
  const date = document.getElementById('eDate').value;
  const start = document.getElementById('eStart').value;
  const end = document.getElementById('eEnd').value;
  const name = document.getElementById('eName').value.trim();
  const company = document.getElementById('eCompany').value;
  const title = document.getElementById('eTitle').value.trim();
  const email = document.getElementById('eEmail').value.trim();

  if(!name || !date || !start || !end){ toast(t('fillRequired'), true); return; }
  if(s.requireCompany && !company){ toast(t('fillRequired'), true); return; }
  if(s.requireEmail && !email){ toast(t('fillRequired'), true); return; }

  const startM = timeToMin(start), endM = timeToMin(end);
  const dur = endM - startM;
  if(dur <= 0 || dur < s.minDurationMinutes || dur > s.maxDurationMinutes){
    toast(t('conflict'), true); return;
  }
  if(startM < timeToMin(s.openStart) || endM > timeToMin(s.openEnd)){
    toast(t('conflict'), true); return;
  }

  const buf = s.bufferMinutes||0;
  const conflict = state.bookings.some(other=>{
    if(other.id===b.id) return false; // exclude itself
    if(other.roomId!==b.roomId || other.date!==date) return false;
    return overlaps(startM-buf, endM+buf, timeToMin(other.startTime), timeToMin(other.endTime));
  });
  if(conflict){ toast(t('conflict'), true); return; }

  Object.assign(b, { date, startTime:start, endTime:end, name, company, title, email });
  document.getElementById('modalRoot').innerHTML='';

  updateBookingDb(b.id, {
    date, start_time:start, end_time:end, name, company, title, email
  }).then(ok=>{ if(ok) toast(t('savedOk')); });
}

      <div class="section-title" style="margin:0;">${t('rooms')}</div>
      <button class="btn primary small" id="addRoomBtn">+ ${t('addRoom')}</button>
    </div>
    <table class="rooms-table">
      <thead><tr><th></th><th>${t('roomName')}</th><th>Floor</th><th>${t('capacity')}</th><th>${t('equipment')}</th><th></th><th></th></tr></thead>
      <tbody>${rows || `<tr><td colspan="7" style="text-align:center;color:var(--text-dim);padding:20px;">—</td></tr>`}</tbody>
    </table>
  `;
}

function renderRoomForm(room){
  const r = room || { id:null, name:'', floor:'', capacity:'', equipment:'', color:'#4d8dff', active:true, ruagOnly:false };
  return `
  <div class="overlay" id="overlayRoom">
    <div class="modal">
      <div class="modal-head"><h3>${room?t('edit'):t('addRoom')}</h3><button class="close-x" id="closeRoomForm">✕</button></div>
      <div class="modal-body">
        <div class="field"><label>${t('roomName')} *</label><input type="text" id="rfName" value="${escapeHtml(r.name)}"></div>
        <div class="row2">
          <div class="field"><label>Floor</label><input type="text" id="rfFloor" value="${escapeHtml(r.floor)}"></div>
          <div class="field"><label>${t('capacity')}</label><input type="number" id="rfCap" value="${r.capacity}"></div>
        </div>
        <div class="field"><label>${t('equipment')}</label><input type="text" id="rfEquip" value="${escapeHtml(r.equipment)}"></div>
        <div class="row2">
          <div class="field"><label>Color</label><input type="color" id="rfColor" value="${r.color}" style="height:38px;padding:2px;"></div>
          <div class="field">
            <label>${t('active')}</label>
            <div class="checkbox-row" style="height:38px;"><input type="checkbox" id="rfActive" ${r.active!==false?'checked':''}></div>
          </div>
        </div>
        <div class="field">
          <div class="checkbox-row">
            <input type="checkbox" id="rfRuagOnly" ${r.ruagOnly?'checked':''}>
            <label style="margin:0;text-transform:none;font-size:13px;color:var(--text);" for="rfRuagOnly">${t('ruagOnly')}</label>
          </div>
          <div class="hint">${t('ruagOnlyHint')}</div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn ghost" id="cancelRoomForm">${t('cancel')}</button>
        <button class="btn primary" id="saveRoomForm">${t('save')}</button>
      </div>
    </div>
  </div>`;
}

function renderAdminGeneral(){
  const s = state.settings;
  const viewOpts = ['day','week'].map(v=>`<option value="${v}" ${s.defaultView===v?'selected':''}>${t(v)}</option>`).join('');
  return `
    <div class="section-title">${t('general')}</div>
    <div class="settings-grid">
      <div class="field"><label>${t('defaultView')}</label><select id="setDefView">${viewOpts}</select></div>
      <div class="field"><div class="checkbox-row"><input type="checkbox" id="setWeekends" ${s.allowWeekends?'checked':''}><label style="margin:0;text-transform:none;color:var(--text);" for="setWeekends">${t('weekends')}</label></div></div>
    </div>
    <div class="section-title">${t('dangerZone')}</div>
    <button class="btn danger" id="deleteAllBtn">🗑 ${t('deleteAll')}</button>
    <div style="margin-top:20px;"><button class="btn primary" id="saveGeneralBtn">${t('save')}</button></div>
  `;
}

function renderAdminBooking(){
  const s = state.settings;
  return `
    <div class="section-title">${t('booking')}</div>
    <div class="settings-grid">
      <div class="field"><label>${t('interval')}</label><input type="number" id="setInterval" value="${s.bookingIntervalMinutes}"></div>
      <div class="field"><label>${t('buffer')}</label><input type="number" id="setBuffer" value="${s.bufferMinutes}"></div>
      <div class="field"><label>${t('minDur')}</label><input type="number" id="setMinDur" value="${s.minDurationMinutes}"></div>
      <div class="field"><label>${t('maxDur')}</label><input type="number" id="setMaxDur" value="${s.maxDurationMinutes}"></div>
      <div class="field"><label>${t('openingHours')} — Start</label><input type="time" id="setOpenStart" value="${s.openStart}"></div>
      <div class="field"><label>${t('openingHours')} — End</label><input type="time" id="setOpenEnd" value="${s.openEnd}"></div>
      <div class="field"><label>${t('leadTime')}</label><input type="number" id="setLeadTime" value="${s.leadTimeDays}"></div>
    </div>
    <div class="section-title">Regeln</div>
    <div class="settings-grid">
      <div class="field"><div class="checkbox-row"><input type="checkbox" id="setReqCompany" ${s.requireCompany?'checked':''}><label style="margin:0;text-transform:none;color:var(--text);" for="setReqCompany">${t('requireCompany')}</label></div></div>
      <div class="field"><div class="checkbox-row"><input type="checkbox" id="setReqEmail" ${s.requireEmail?'checked':''}><label style="margin:0;text-transform:none;color:var(--text);" for="setReqEmail">${t('requireEmail')}</label></div></div>
      <div class="field"><div class="checkbox-row"><input type="checkbox" id="setAllowRecurring" ${s.allowRecurring?'checked':''}><label style="margin:0;text-transform:none;color:var(--text);" for="setAllowRecurring">${t('allowRecurring')}</label></div></div>
      <div class="field">
        <div class="checkbox-row"><input type="checkbox" id="setOnlyCreator" ${s.onlyCreatorCanCancel?'checked':''}><label style="margin:0;text-transform:none;color:var(--text);" for="setOnlyCreator">${t('onlyCreator')}</label></div>
        <div class="hint">${t('onlyCreatorSettingHint')}</div>
      </div>

    <div style="margin-top:20px;"><button class="btn primary" id="saveBookingBtn">${t('save')}</button></div>

function renderAdminCompanies(){
  const chips = state.settings.companies.map(c=>`<span class="chip">${escapeHtml(c)}<button data-company="${escapeHtml(c)}">✕</button></span>`).join('');
  return `
    <div class="section-title">${t('companiesLbl')}</div>
    <div style="margin-bottom:14px;">${chips}</div>
    <div class="row2" style="max-width:400px;">
      <input type="text" id="newCompanyInput" placeholder="${t('company')}">
      <button class="btn primary" id="addCompanyBtn">+ ${t('addCompany')}</button>
    </div>
  `;
}

function renderAdminSecurity(){
  return `
    <div class="section-title">${t('changePw')}</div>
    <div style="max-width:360px;">
      <div class="field"><label>${t('newPw')}</label><input type="password" id="newPw" autocomplete="new-password"></div>
      <button class="btn primary" id="changePwBtn">${t('save')}</button>
    </div>
  `;
}

function attachAdminEvents(){
  document.querySelectorAll('.tab').forEach(el=>{
    el.onclick = ()=>{ state.adminTab = el.getAttribute('data-tab'); render(); };
  });

  if(state.adminTab==='rooms'){
    const addBtn = document.getElementById('addRoomBtn');
    if(addBtn) addBtn.onclick = ()=>openRoomForm(null);
    document.querySelectorAll('[data-act="editroom"]').forEach(el=>{
      el.onclick = ()=>{ const id = el.closest('tr').getAttribute('data-room'); openRoomForm(state.rooms.find(r=>r.id===id)); };
    });
    document.querySelectorAll('[data-act="delroom"]').forEach(el=>{
      el.onclick = ()=>{
        const id = el.closest('tr').getAttribute('data-room');
        showConfirm(t('removeRoomConfirm'), ()=>{
          state.rooms = state.rooms.filter(r=>r.id!==id);
          render();
          deleteRoomDb(id).then(ok=>{ if(ok) toast(t('savedOk')); });
        });
      };
    });
  }

  if(state.adminTab==='general'){
    const del = document.getElementById('deleteAllBtn');
    if(del) del.onclick = ()=>{
      showConfirm(t('deleteAllConfirm'), ()=>{
        showConfirm(t('deleteAllConfirm'), ()=>{
          state.bookings = [];
          render();
          deleteAllBookingsDb().then(ok=>{ if(ok) toast(t('savedOk')); });
        });
      });
    };
    const save = document.getElementById('saveGeneralBtn');
    if(save) save.onclick = ()=>{
      state.settings.defaultView = document.getElementById('setDefView').value;
      state.settings.allowWeekends = document.getElementById('setWeekends').checked;
      render();
      saveSettings().then(ok=>{ if(ok) toast(t('savedOk')); });
    };
  }

  if(state.adminTab==='booking'){
    const save = document.getElementById('saveBookingBtn');
    if(save) save.onclick = ()=>{
      const s = state.settings;
      s.bookingIntervalMinutes = parseInt(document.getElementById('setInterval').value)||30;
      s.bufferMinutes = parseInt(document.getElementById('setBuffer').value)||0;
      s.minDurationMinutes = parseInt(document.getElementById('setMinDur').value)||30;
      s.maxDurationMinutes = parseInt(document.getElementById('setMaxDur').value)||240;
      s.openStart = document.getElementById('setOpenStart').value;
      s.openEnd = document.getElementById('setOpenEnd').value;
      s.leadTimeDays = parseInt(document.getElementById('setLeadTime').value)||28;
      s.requireCompany = document.getElementById('setReqCompany').checked;
      s.requireEmail = document.getElementById('setReqEmail').checked;
      s.allowRecurring = document.getElementById('setAllowRecurring').checked;
      s.onlyCreatorCanCancel = document.getElementById('setOnlyCreator').checked;
      render();
      saveSettings().then(ok=>{ if(ok) toast(t('savedOk')); });
    };
  }

  if(state.adminTab==='companies'){
    const addBtn = document.getElementById('addCompanyBtn');
    if(addBtn) addBtn.onclick = ()=>{
      const input = document.getElementById('newCompanyInput');
      const val = input.value.trim();
      if(val && !state.settings.companies.includes(val)){
        state.settings.companies.push(val);
        render();
        saveSettings().then(ok=>{ if(ok) toast(t('savedOk')); });
      }
    };
    document.querySelectorAll('[data-company]').forEach(el=>{
      el.onclick = ()=>{
        state.settings.companies = state.settings.companies.filter(c=>c!==el.getAttribute('data-company'));
        render();
        saveSettings().then(ok=>{ if(ok) toast(t('savedOk')); });
      };
    });
  }

  if(state.adminTab==='security'){
    const btn = document.getElementById('changePwBtn');
    if(btn) btn.onclick = async ()=>{
      const nw = document.getElementById('newPw').value;
      if(!nw || nw.length<6){ toast(t('fillRequired'), true); return; }
      btn.disabled = true;
      try{
        const { error } = await withTimeout(sbClient.auth.updateUser({ password: nw }), 8000);
        if(error){ toast(t('saveFailed'), true); }
        else{ toast(t('savedOk')); document.getElementById('newPw').value=''; }
      }catch(e){ toast(t('saveFailed'), true); }
      btn.disabled = false;
    };
  }
}

function openRoomForm(room){
  document.getElementById('modalRoot').innerHTML = renderRoomForm(room);
  const close = ()=>{ document.getElementById('modalRoot').innerHTML=''; };
  document.getElementById('closeRoomForm').onclick = close;
  document.getElementById('cancelRoomForm').onclick = close;
  document.getElementById('saveRoomForm').onclick = ()=>{
    const name = document.getElementById('rfName').value.trim();
    if(!name){ toast(t('fillRequired'), true); return; }
    const data = {
      name,
      floor: document.getElementById('rfFloor').value.trim(),
      capacity: parseInt(document.getElementById('rfCap').value)||0,
      equipment: document.getElementById('rfEquip').value.trim(),
      color: document.getElementById('rfColor').value,
      active: document.getElementById('rfActive').checked,
      ruagOnly: document.getElementById('rfRuagOnly').checked,
    };
    let savedRoom;
    if(room){
      Object.assign(room, data);
      savedRoom = room;
    } else {
      savedRoom = { id: uid(), ...data };
      state.rooms.push(savedRoom);
    }
    close(); render();
    upsertRoom(savedRoom).then(ok=>{ if(ok) toast(t('savedOk')); });
  };
}

function escapeHtml(str){
  if(str===undefined || str===null) return '';
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ---------------- Boot ---------------- */
window.addEventListener('error', (e)=>{
  const app = document.getElementById('app');
  if(app && (!app.innerHTML || state.loading)){
    app.innerHTML = `<div class="empty-state">⚠️ Fehler beim Laden der App.<br><span style="font-size:11px;color:var(--text-dim);">${escapeHtml(e.message||'')}</span></div>`;
  }
});
loadData();
</script>
